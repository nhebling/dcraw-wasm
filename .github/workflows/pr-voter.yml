name: PR voter

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

concurrency:
  group: pr-voter-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Emscripten
        run: |
          git clone --depth=1 https://github.com/emscripten-core/emsdk.git $HOME/emsdk
          $HOME/emsdk/emsdk install latest
          $HOME/emsdk/emsdk activate latest
          echo "$HOME/emsdk" >> $GITHUB_PATH
          echo "$HOME/emsdk/upstream/emscripten" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Pack integration
        run: npm run test:pack
