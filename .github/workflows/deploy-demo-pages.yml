name: Deploy Demo to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Restrict manual runs to repository owner
        if: github.actor != github.repository_owner
        run: |
          echo "Only the repository owner can run this workflow."
          exit 1

      - name: Resolve latest release
        id: latest-release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              core.setOutput('tag', data.tag_name);
              core.notice(`Deploying demo for release ${data.tag_name}`);
            } catch (error) {
              core.setFailed('No published GitHub release was found for this repository.');
            }

      - name: Check out latest release
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.latest-release.outputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Emscripten
        shell: bash
        run: |
          git clone --depth=1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          "$HOME/emsdk/emsdk" install latest
          "$HOME/emsdk/emsdk" activate latest
          echo "$HOME/emsdk" >> "$GITHUB_PATH"
          echo "$HOME/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm ci

      - name: Build production demo
        shell: bash
        run: |
          source "$HOME/emsdk/emsdk_env.sh"
          npm run build:prod
          npm run copy

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
